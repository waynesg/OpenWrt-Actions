name: ImmortalWrt x86_64 Build

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'warmup: only download dl and save cache; build: full compile'
        required: true
        default: 'build'
        type: choice
        options: [build, warmup]
      repo_branch:
        description: 'Override source branch (empty = use targets/Immortalwrt/settings.ini)'
        required: false
        default: ''
      repo_commit:
        description: 'Optional: pin source to a specific commit (short/long SHA). Empty = do not pin.'
        required: false
        default: ''
      upload_release:
        description: 'Force UPLOAD_RELEASE (true/false). Empty = use settings.ini'
        required: false
        default: ''
  push:
    branches: [ main ]
    paths:
      - 'targets/Immortalwrt/**'
      - 'scripts/**'
      - '.github/workflows/**'
  schedule:
    # Every Friday 08:00 UTC (Beijing 16:00)
    - cron: '0 8 * * 5'

env:
  TZ: Asia/Shanghai
  BUILD_DIR: /builder
  OPENWRT_DIR: openwrt
  TARGET: Immortalwrt
  CACHE_VER: v3

jobs:
  build:
    runs-on: ubuntu-22.04
    if: ${{ github.event.repository.owner.id == github.event.sender.id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup variables
        run: |
          set -euo pipefail
          sudo timedatectl set-timezone "$TZ"
          echo "FILE_DATE=$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

      - name: Free disk space (safe)
        run: |
          set -eux
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc || true
          sudo rm -rf /var/lib/docker || true
          sudo docker image prune -a -f || true
          sudo apt-get -y autoremove --purge || true
          sudo apt-get -y clean || true
          df -hT || true

      - name: Init build environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          set -euo pipefail
          bash scripts/ubuntu.sh
          sudo mkdir -p "${BUILD_DIR}"
          sudo chown "$USER:$(id -gn)" "${BUILD_DIR}"

      - name: Load target settings
        run: |
          set -euo pipefail
          # shellcheck disable=SC1090
          source "targets/${TARGET}/settings.ini"

          INPUT_BRANCH="${{ github.event.inputs.repo_branch }}"
          if [ -n "${INPUT_BRANCH:-}" ]; then
            REPO_BRANCH="$INPUT_BRANCH"
          fi

          INPUT_COMMIT="${{ github.event.inputs.repo_commit }}"
          if [ -n "${INPUT_COMMIT:-}" ]; then
            echo "REPO_COMMIT=$INPUT_COMMIT" >> $GITHUB_ENV
          fi

          INPUT_UPLOAD_RELEASE="${{ github.event.inputs.upload_release }}"
          if [ -n "${INPUT_UPLOAD_RELEASE:-}" ]; then
            UPLOAD_RELEASE="$INPUT_UPLOAD_RELEASE"
          fi

          echo "REPO_URL=$REPO_URL" >> $GITHUB_ENV
          echo "REPO_BRANCH=$REPO_BRANCH" >> $GITHUB_ENV
          echo "UPLOAD_RELEASE=$UPLOAD_RELEASE" >> $GITHUB_ENV
          echo "UPLOAD_FIRMWARE=$UPLOAD_FIRMWARE" >> $GITHUB_ENV
          echo "UPLOAD_CONFIG=$UPLOAD_CONFIG" >> $GITHUB_ENV
          echo "UPLOAD_BIN_DIR=$UPLOAD_BIN_DIR" >> $GITHUB_ENV
          echo "SERVERCHAN_SCKEY=$SERVERCHAN_SCKEY" >> $GITHUB_ENV
          echo "USE_CACHEWRTBUILD=$USE_CACHEWRTBUILD" >> $GITHUB_ENV

      - name: Clone source code
        working-directory: ${{ env.BUILD_DIR }}
        run: |
          set -euo pipefail
          git clone -b "$REPO_BRANCH" --single-branch --filter=blob:none "$REPO_URL" "$OPENWRT_DIR"
          cd "$OPENWRT_DIR"

          if [ -n "${REPO_COMMIT:-}" ]; then
            # Ensure the commit exists in this partial clone
            git fetch --depth=1 origin "$REPO_COMMIT"
            git checkout "$REPO_COMMIT"
          fi

          echo "OPENWRT_COMMIT=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
          echo "Using source: $(git log -1 --oneline)"

          ln -sf "${BUILD_DIR}/${OPENWRT_DIR}" "$GITHUB_WORKSPACE/openwrt"

      - name: Restore cache (dl)
        if: env.USE_CACHEWRTBUILD == 'true'
        uses: actions/cache/restore@v4
        with:
          path: openwrt/dl
          key: ${{ runner.os }}-openwrt-dl-${{ github.ref_name }}-${{ env.CACHE_VER }}-${{ env.OPENWRT_COMMIT }}-${{ hashFiles('targets/Immortalwrt/settings.ini', 'targets/Immortalwrt/.config', 'targets/Immortalwrt/diy-part.sh', '.github/workflows/build.yml', 'scripts/**') }}
          restore-keys: |
            ${{ runner.os }}-openwrt-dl-${{ github.ref_name }}-${{ env.CACHE_VER }}-${{ env.OPENWRT_COMMIT }}-
            ${{ runner.os }}-openwrt-dl-${{ github.ref_name }}-${{ env.CACHE_VER }}-
            ${{ runner.os }}-openwrt-dl-

      - name: Restore cache (ccache)
        if: env.USE_CACHEWRTBUILD == 'true'
        uses: actions/cache/restore@v4
        with:
          path: openwrt/.ccache
          key: ${{ runner.os }}-openwrt-ccache-${{ github.ref_name }}-${{ env.CACHE_VER }}-${{ env.OPENWRT_COMMIT }}-${{ hashFiles('targets/Immortalwrt/settings.ini', 'targets/Immortalwrt/.config', 'targets/Immortalwrt/diy-part.sh', '.github/workflows/build.yml', 'scripts/**') }}
          restore-keys: |
            ${{ runner.os }}-openwrt-ccache-${{ github.ref_name }}-${{ env.CACHE_VER }}-${{ env.OPENWRT_COMMIT }}-
            ${{ runner.os }}-openwrt-ccache-${{ github.ref_name }}-${{ env.CACHE_VER }}-
            ${{ runner.os }}-openwrt-ccache-

      - name: Setup ccache
        if: env.USE_CACHEWRTBUILD == 'true'
        run: |
          echo "CCACHE_DIR=$GITHUB_WORKSPACE/openwrt/.ccache" >> $GITHUB_ENV
          echo "CCACHE_MAXSIZE=5G" >> $GITHUB_ENV
          ccache -M 5G || true
          ccache -s || true

      - name: Apply overlay + feeds + config + DIY
        run: |
          set -euo pipefail
          cd openwrt

          # Overlay files
          if [ -d "$GITHUB_WORKSPACE/targets/$TARGET/files" ]; then
            mkdir -p files
            cp -a "$GITHUB_WORKSPACE/targets/$TARGET/files/." files/
          fi

          # Feeds first
          ./scripts/feeds update -a

          # Fix libffi install-dev: fficonfig.h location differs across build variants.
          # Robust fix: patch Makefile to locate fficonfig.h via find() at install time.
          if [ -f feeds/packages/libs/libffi/Makefile ]; then
            mkdir -p feeds/packages/libs/libffi/patches
            python3 -c 'import pathlib; p=pathlib.Path("feeds/packages/libs/libffi/patches/999-fix-fficonfig-find.patch"); p.write_text("--- a/Makefile\n+++ b/Makefile\n@@ -60,9 +60,16 @@\n\t$(CP) \\\n\t\t$(PKG_INSTALL_DIR)/usr/include/*.h \\\n\t\t$(1)/usr/include/\n-\t$(CP) \\\n-\t\t$(PKG_BUILD_DIR)/$(GNU_TARGET_NAME)*/fficonfig.h \\\n-\t\t$(1)/usr/include/\n+\t@set -e; \\\n+\tFFI_CFG=$$(find \"$(PKG_BUILD_DIR)\" -name fficonfig.h -type f | head -n 1); \\\n+\tif [ -z \"$$FFI_CFG\" ]; then \\\n+\t\techo \"ERROR: fficonfig.h not found under $(PKG_BUILD_DIR)\" >&2; \\\n+\t\texit 1; \\\n+\tfi; \\\n+\t$(CP) \"$$FFI_CFG\" \"$(1)/usr/include/\"\n endef\n"); print("wrote",p)'
          fi

          # Config
          cp "$GITHUB_WORKSPACE/targets/$TARGET/.config" .config

          # DIY scripts
          if [ -f "$GITHUB_WORKSPACE/targets/$TARGET/waynesg/diy-repo-script.sh" ]; then
            bash "$GITHUB_WORKSPACE/targets/$TARGET/waynesg/diy-repo-script.sh" || true
          fi
          if [ -f "$GITHUB_WORKSPACE/targets/$TARGET/waynesg/preset-clash-core.sh" ]; then
            bash "$GITHUB_WORKSPACE/targets/$TARGET/waynesg/preset-clash-core.sh" || true
          fi
          bash "$GITHUB_WORKSPACE/targets/$TARGET/diy-part.sh" || true

          # Install feeds after DIY
          ./scripts/feeds install -a -f

      - name: Generate .config
        run: |
          set -euo pipefail
          cd openwrt
          make defconfig
          ./scripts/diffconfig.sh > "$GITHUB_WORKSPACE/diffconfig.txt" || true

      - name: Download dl
        run: |
          set -euo pipefail
          cd openwrt
          make download -j8
          find dl -size -1024c -exec rm -f {} \; || true

      - name: Save cache (dl)
        if: env.USE_CACHEWRTBUILD == 'true'
        uses: actions/cache/save@v4
        with:
          path: openwrt/dl
          key: ${{ runner.os }}-openwrt-dl-${{ github.ref_name }}-${{ env.CACHE_VER }}-${{ env.OPENWRT_COMMIT }}-${{ hashFiles('targets/Immortalwrt/settings.ini', 'targets/Immortalwrt/.config', 'targets/Immortalwrt/diy-part.sh', '.github/workflows/build.yml', 'scripts/**') }}

      - name: Warmup mode stop
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'warmup'
        run: echo "Warmup done (dl cached)." && exit 0

      - name: "Preflight: toolchain + troublemakers (libffi/docker)"
        id: preflight
        continue-on-error: true
        run: |
          set -euo pipefail
          cd openwrt
          : > build.log

          echo "===== PRECHECK toolchain/install =====" | tee -a build.log
          # If staging_dir/toolchain-* is half-baked (cache/resume), many packages will fail with confusing errors.
          rm -rf staging_dir/toolchain-* staging_dir/target-*_musl/hostpkg 2>/dev/null || true
          # Build and install the full toolchain first.
          if make -j1 V=sc toolchain/install 2>&1 | tee -a build.log; then
            echo "toolchain/install ok" | tee -a build.log
          else
            echo "toolchain/install failed (stop early)" | tee -a build.log
            exit 1
          fi

          echo "===== PRECHECK libffi =====" | tee -a build.log
          (make -j1 V=sc package/feeds/packages/libffi/compile 2>&1 | tee -a build.log) || true

          echo "===== PRECHECK docker =====" | tee -a build.log
          (make -j1 V=sc package/feeds/packages/docker/compile 2>&1 | tee -a build.log) || true

      - name: Compile firmware
        id: compile
        # Keep going so we can still upload logs/artifacts, but don't hang forever.
        continue-on-error: true
        timeout-minutes: 360
        run: |
          set -euo pipefail
          cd openwrt
          echo "$(nproc) thread compile" | tee -a build.log

          # Run full build; if it fails, rerun with verbose output and append to build.log.
          if make -j"$(nproc)" 2>&1 | tee -a build.log; then
            echo "COMPILESTATUS=success" >> $GITHUB_ENV
          else
            make -j1 V=sc 2>&1 | tee -a build.log || true
            echo "COMPILESTATUS=failure" >> $GITHUB_ENV
          fi

      - name: Debug logs (libffi config.log tail)
        if: always()
        run: |
          set -euxo pipefail
          # If the job was cancelled before cloning/openwrt was created, don't fail this step.
          [ -d openwrt ] || exit 0
          cd openwrt
          for f in $(find build_dir -maxdepth 6 -type f -name config.log | grep -iE "libffi" || true); do
            echo "===== $f (tail) =====" | tee -a build.log
            tail -n 200 "$f" | tee -a build.log || true
          done

      - name: Save cache (ccache)
        if: env.USE_CACHEWRTBUILD == 'true'
        uses: actions/cache/save@v4
        with:
          path: openwrt/.ccache
          key: ${{ runner.os }}-openwrt-ccache-${{ github.ref_name }}-${{ env.CACHE_VER }}-${{ env.OPENWRT_COMMIT }}-${{ hashFiles('targets/Immortalwrt/settings.ini', 'targets/Immortalwrt/.config', 'targets/Immortalwrt/diy-part.sh', '.github/workflows/build.yml', 'scripts/**') }}

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log_Immortalwrt_x86_64_${{ env.FILE_DATE }}
          path: openwrt/build.log

      - name: Organize firmware
        if: env.COMPILESTATUS == 'success' && env.UPLOAD_FIRMWARE == 'true'
        run: |
          set -euo pipefail
          cd openwrt/bin/targets/*/*
          rm -rf packages || true
          find . -maxdepth 1 -type f -name "*buildinfo*" -delete || true
          find . -maxdepth 1 -type f -name "*sha256sums*" -delete || true
          find . -maxdepth 1 -type f -name "*manifest*" -delete || true
          echo "FIRMWARE=$PWD" >> $GITHUB_ENV

      - name: Upload firmware artifact
        if: env.COMPILESTATUS == 'success' && env.UPLOAD_FIRMWARE == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: Immortalwrt-x86_64-firmware_${{ env.FILE_DATE }}
          path: ${{ env.FIRMWARE }}

      - name: Release
        if: env.COMPILESTATUS == 'success' && env.UPLOAD_RELEASE == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.FILE_DATE }}
          name: Immortalwrt x86_64 ${{ env.FILE_DATE }}
          files: ${{ env.FIRMWARE }}/*

      - name: Notify (Telegram)
        if: env.COMPILESTATUS == 'success'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          set -euo pipefail
          if [ -n "${TELEGRAM_BOT_TOKEN:-}" ] && [ -n "${TELEGRAM_CHAT_ID:-}" ]; then
            MSG="ImmortalWrt x86_64 build success: ${FILE_DATE} (source ${OPENWRT_COMMIT})"
            curl -fsSL "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d chat_id="${TELEGRAM_CHAT_ID}" -d text="${MSG}" >/dev/null
          else
            echo "Telegram secrets not set, skip."
          fi
