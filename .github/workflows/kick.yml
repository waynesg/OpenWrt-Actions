name: Kick Compile (two-stage)

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Optional note (written into relevance/start)'
        required: false
        default: ''
  schedule:
    - cron: '0 8 * * 5'

jobs:
  kick:
    runs-on: ubuntu-22.04
    if: ${{ github.event.repository.owner.id == github.event.sender.id }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Touch relevance/start to trigger compile.yml
        run: |
          set -euo pipefail
          mkdir -p targets/Immortalwrt/relevance
          echo "kick $(date -u +'%Y-%m-%dT%H:%M:%SZ') ${{ github.event.inputs.reason }}" >> targets/Immortalwrt/relevance/start

      - name: Commit & push
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add targets/Immortalwrt/relevance/start
          git commit -m "kick: trigger compile" || exit 0
          git push
